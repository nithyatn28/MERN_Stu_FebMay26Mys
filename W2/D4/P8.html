<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divided x y axis</title>
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script> 
</head>
<body>
    <main class="max-w-4xl mx-auto p-6 space-y-8">
        <section class="border rounded p-6 space-y-4"><span class="font-bold">Divide-x-axis</span>
            <div class="flex divide-x-2 divide-gray-500 rounded border overflow-hidden"> 
                <div class="p-4 flex-1">
                    <div class="text-sm">Student</div>
                    <div class="text-xl font-bold">46</div>
                </div>
                 <div class="p-4 flex-1">
                    <div class="text-sm">Placed</div>
                    <div class="text-xl font-bold">100%</div>
                </div>
                 <div class="p-4 flex-1">
                    <div class="text-sm">In-progress</div>
                    <div class="text-xl font-bold">0%</div>
                </div>
            </div>
        </section>
        <section class="border rounded p-6 space-y-4"><span class="font-bold">Divide-y-axis</span>
            <div class="divide-y-2 divide-red-500">
                <div class="p-4 flex item-center justify-between">
                    <div class="font-bold ">Notifications</div>
                    <div class="font-sm text-gray-500 ">Email+SMS</div>
                <button class="px-3 py-2 border rounded hover:bg-green-100">Edit</button>
              </div>
              <div class="p-4 flex item-center justify-between">
                    <div class="font-bold ">Primary changes</div>
                    <div class="font-sm text-gray-500 ">Email+SMS</div>
                <button class="px-3 py-2 border rounded hover:bg-green-100">Edit</button>
              </div>
            </div>
        </section>
    </main>
</body>
</html>
