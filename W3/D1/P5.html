<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS:objects and arrays</title>
</head>
<body>
    <pre id="out"></pre>
    <button id="runBtn" class="px-3 py-1 text-white rounded mt-2 mb-2 bg-black">
       Run
    </button>
    <script>
        const out = document.getElementById("out");
        function print(...args){
        //console 
           console.log(...args);
            out.textContent+=args.join("")+"\n";
        }
        function clearOut () {
            out.textContent = "";
        }
        function run () {
            clearOut ();
            const user = {name:"Nithya",age:21};
            print("user",JSON.stringify(user));

            const myArray = [1,2,3];
            myArray.push(5);
            print("is it an array:?",Array.isArray(myArray));
        }
       document.getElementById("runBtn").addEventListener("click",run);  
    </script>
</body>
</html>
