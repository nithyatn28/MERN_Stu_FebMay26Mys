<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS:Console usage and simple dom manupulation</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>    
<h1 class="text-2xl font-bold">My first java scripts</h1>
<button id="runBtn" class="px-3 py-1 text-white rounded mt-2 mb-2 bg-black">
Run
</button>
<pre id="out"></pre>

<script>
const out = document.getElementById("out");
//function which accepts variable number of arguments
function print(...args){
//console 
console.log(...args);
   out.textContent+=args.join("")+"\n";
}
function run () {
    print("hello from java script!");
    print("2+3=",2+3);
    document.body.style.background ="#FCC6BB";
    }
    document.getElementById("runBtn").addEventListener("click",run); 
    run();
</script>
</body>
</html>
